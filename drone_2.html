<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Voo de Drone 3D Urbano</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: #050505;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        /* HUD de Telemetria do Drone */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 16, 26, 0.85);
            color: #00ffcc;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            z-index: 10;
            pointer-events: none;
        }

        .telemetry {
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);
        }

        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 13px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            border: 1px solid #333;
        }

        kbd {
            background: #333;
            border: 1px solid #555;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 11px;
        }

        /* Crosshair estofado de Drone */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 204, 0.5);
        }
        #crosshair::before { top: 19px; left: 0; width: 40px; height: 2px; }
        #crosshair::after { top: 0; left: 19px; width: 2px; height: 40px; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-size: 12px; color: #888; margin-bottom: 5px;">SYS.STATUS: ONLINE</div>
        <div class="telemetry">ALTITUDE: <span id="alt-val">50</span> m</div>
        <div class="telemetry">VELOCID.: <span id="speed-val">0</span> km/h</div>
        <div class="telemetry">DIREÇÃO : <span id="heading-val">0</span>°</div>
    </div>

    <div id="controls-info">
        <kbd>W</kbd> <kbd>S</kbd> Avançar/Recuar | <kbd>A</kbd> <kbd>D</kbd> Girar Drone | <kbd>▲</kbd> <kbd>▼</kbd> Subir/Descer Altura
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- CONFIGURAÇÃO DO CENÁRIO 3D (THREE.JS) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.0015); // Neblina urbana estilizada

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(scene.fog.color);
        container.appendChild(renderer.domElement);

        // --- ILUMINAÇÃO ---
        const ambientLight = new THREE.AmbientLight(0x666666);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(500, 1000, 500);
        scene.add(dirLight);

        // --- SOLO (TEXTURA DE MAPA URBANO REAL) ---
        // Usando uma imagem estática de satélite de alta fidelidade para o solo
        const textureLoader = new THREE.TextureLoader();
        const mapTexture = textureLoader.load('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=2000&q=80', (texture) => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(10, 10);
        });

        const groundGeo = new THREE.PlaneGeometry(5000, 5000);
        const groundMat = new THREE.MeshLambertMaterial({ map: mapTexture });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2; // Deita o plano para virar o chão
        scene.add(ground);

        // --- GERAÇÃO DE PRÉDIOS 3D EM DETALHE ---
        // Criamos uma malha procedural de blocos simulando Manhattan de forma performática
        const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
        // Textura básica simulando janelas de prédios à distância
        const buildingMat = new THREE.MeshLambertMaterial({ color: 0x223344 });
        const buildingsMesh = new THREE.InstancedMesh(buildingGeo, buildingMat, 400);

        const dummy = new THREE.Object3D();
        for (let i = 0; i < 400; i++) {
            // Distribui os edifícios no mapa
            const scaleX = 20 + Math.random() * 40;
            const scaleY = 40 + Math.random() * 200; // Altura dos prédios
            const scaleZ = 20 + Math.random() * 40;

            const posX = (Math.random() - 0.5) * 3000;
            const posZ = (Math.random() - 0.5) * 3000;

            dummy.position.set(posX, scaleY / 2, posZ);
            dummy.scale.set(scaleX, scaleY, scaleZ);
            dummy.updateMatrix();
            buildingsMesh.setMatrixAt(i, dummy.matrix);
        }
        scene.add(buildingsMesh);

        // --- VARIÁVEIS DE CONTROLE DO DRONE ---
        let dronePos = { x: 0, y: 80, z: 200 }; // Posição inicial
        let droneHeading = 0; // Direção (rotação horizontal em radianos)
        let speed = 0;
        const maxSpeed = 4.0;
        const friction = 0.95;

        // Estado do Teclado
        const keys = { w: false, s: false, a: false, d: false, arrowup: false, arrowdown: false };

        window.addEventListener('keydown', (e) => handleKey(e, true));
        window.addEventListener('keyup', (e) => handleKey(e, false));

        function handleKey(e, isPressed) {
            let k = e.key.toLowerCase();
            if (k === "arrowup") k = "arrowup";
            if (k === "arrowdown") k = "arrowdown";
            if (k in keys) keys[k] = isPressed;
        }

        // --- LOOP DE ANIMAÇÃO E FÍSICA ---
        function animate() {
            requestAnimationFrame(animate);

            // Controles de direção e rotação (A / D)
            if (keys.a) droneHeading += 0.03;
            if (keys.d) droneHeading -= 0.03;

            // Avançar e recuar (W / S)
            if (keys.w) speed = Math.min(speed + 0.1, maxSpeed);
            else if (keys.s) speed = Math.max(speed - 0.1, -maxSpeed / 2);
            else speed *= friction; // Arrasto do ar

            // Alteração de Altitude (Setas)
            if (keys.arrowup) dronePos.y += 1.2;
            if (keys.arrowdown) dronePos.y = Math.max(dronePos.y - 1.2, 5); // Limite de chão

            // Movimentação com base no vetor frontal (Trigonometria)
            dronePos.x -= speed * Math.sin(droneHeading);
            dronePos.z -= speed * Math.cos(droneHeading);

            // Sincroniza a câmera interna com os dados do drone
            camera.position.set(dronePos.x, dronePos.y, dronePos.z);
            
            // Faz a câmera olhar para a frente de onde o drone aponta
            const lookAtTarget = new THREE.Vector3(
                dronePos.x - Math.sin(droneHeading) * 100,
                dronePos.y - 10, // Olhando levemente para baixo
                dronePos.z - Math.cos(droneHeading) * 100
            );
            camera.lookAt(lookAtTarget);

            // --- ATUALIZAÇÃO DO HUD ---
            document.getElementById('alt-val').innerText = Math.round(dronePos.y);
            document.getElementById('speed-val').innerText = Math.round(Math.abs(speed) * 15);
            
            // Converte radianos para graus normais de bússola (0 a 360)
            let degrees = Math.round(droneHeading * (180 / Math.PI)) % 360;
            if (degrees < 0) degrees += 360;
            document.getElementById('heading-val').innerText = degrees;

            renderer.render(scene, camera);
        }

        // Redimensionamento de tela dinâmico
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Inicia o simulador
        animate();
    </script>
</body>
</html>
